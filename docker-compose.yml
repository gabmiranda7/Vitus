version: '3.9'

services:
  db:
    image: postgres:16
    container_name: vitus-db
    environment:
      POSTGRES_DB: VitusDB
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d VitusDB"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/Vitus.API/Dockerfile
    container_name: vitus-api
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=VitusDB;Username=${DB_USER};Password=${DB_PASS}"
      JWT_KEY: ${JWT_KEY}
      ASPNETCORE_ENVIRONMENT: Production

volumes:
  postgres_data: