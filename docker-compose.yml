version: '3.9'
 
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: VitusDB
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d VitusDB"]
      interval: 5s
      timeout: 5s
      retries: 5
 
  api:
    build:
      context: .
      dockerfile: src/Vitus.API/Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=VitusDB;Username=${DB_USER};Password=${DB_PASS}"
      JWT_KEY: ${JWT_KEY}
      ASPNETCORE_ENVIRONMENT: Production
      Storage__Raiz: /app/storage
      Storage__Templates: /app/storage/templates
    volumes:
      - storage_data:/app/storage
      - ./storage/templates:/app/storage/templates:ro
 
  frontend:
    build:
      context: ./web
      args:
        VITE_API_URL: http://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - api
 
volumes:
  postgres_data:
  storage_data: